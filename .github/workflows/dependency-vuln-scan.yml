name: OWASP dependency-check (nightly)

# Runs OWASP dependency-check against the plugin module's runtime/test deps.
# Scheduled nightly instead of per-PR because:
#   * NVD rate-limits unauthenticated clients (~5 req/min) so per-PR runs go
#     yellow most of the time.
#   * The signal is "are any of our pinned versions newly vulnerable?" -- which
#     is a daily property, not a per-commit one.
#
# Provide an NVD API key via the SECRET below to skip rate-limiting:
#   secrets.NVD_API_KEY
# The job tolerates the secret being unset (delete the env line below if you
# never plan to provision the key).
on:
  schedule:
    - cron: '17 4 * * *'   # 04:17 UTC daily
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  scan:
    name: dependencyCheckAnalyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make wrapper executable
        run: chmod +x ./gradlew

      - name: Run dependency-check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -n "$NVD_API_KEY" ]; then
            ./gradlew :org.speleodb.ariane.plugin.speleodb:dependencyCheckAnalyze \
                -PnvdApiKey="$NVD_API_KEY"
          else
            ./gradlew :org.speleodb.ariane.plugin.speleodb:dependencyCheckAnalyze
          fi

      - name: Upload dependency-check report
        if: success() || failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: org.speleodb.ariane.plugin.speleodb/build/reports/dependency-check-report.*
          if-no-files-found: warn
