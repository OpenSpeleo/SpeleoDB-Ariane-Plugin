name: Java CI with Gradle

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs on the same ref when a new push lands.
# This is run-cancellation only -- it does NOT introduce parallel test execution.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: pre-commit lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: "3.14"
          activate-environment: true
        env:
          UV_VENV_SEED: 1

      - name: Install pre-commit
        run: uv pip install pre-commit

      - name: Run pre-commit (root + plugin module)
        run: |
          if [ -f .pre-commit-config.yaml ]; then
            pre-commit run --all-files --show-diff-on-failure
          fi
          if [ -f org.speleodb.ariane.plugin.speleodb/.pre-commit-config.yaml ]; then
            cd org.speleodb.ariane.plugin.speleodb
            pre-commit run --all-files --show-diff-on-failure
          fi

  build-and-test:
    name: build + test (Ubuntu, JDK 25)
    runs-on: ubuntu-latest
    # Hard cap so a stuck test (live API call hanging on a slow/unreachable stage,
    # FX runLater never draining, etc.) cannot consume the default 6h job timeout.
    # Healthy run is ~5 min; 30 gives plenty of slack for cold caches.
    timeout-minutes: 30
    # Least-privilege: read-only token. JUnit XML is published as a downloadable
    # artifact instead of comment/check posts on PRs (which would require
    # checks:write + pull-requests:write and break on fork PRs anyway).
    permissions:
      contents: read
    env:
      # Live API tests (SpeleoDBAPITest) read these via TestEnvironmentConfig's
      # env-var fallback. When the secrets are unset, those tests skip gracefully.
      SPELEODB_INSTANCE_URL: ${{ secrets.SPELEODB_INSTANCE_URL }}
      SPELEODB_OAUTH_TOKEN: ${{ secrets.SPELEODB_OAUTH_TOKEN }}
      SPELEODB_EMAIL: ${{ secrets.SPELEODB_EMAIL }}
      SPELEODB_PASSWORD: ${{ secrets.SPELEODB_PASSWORD }}
      API_TEST_ENABLED: 'true'
      API_TIMEOUT_MS: '15000'
      API_RETRY_COUNT: '3'
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make wrapper executable
        run: chmod +x ./gradlew

      - name: Run plugin tests (:org.speleodb.ariane.plugin.speleodb:test)
        # MUST run before `:build` so the JAR uploaded as the `plugin-jar` artifact
        # is built from clean source (TEST_MODE=false). `:test` mutates the source
        # via the `enableTestMode` Gradle task; the FlowAction resets it after the
        # test JVM exits, so the subsequent `:build` step packages a production
        # JAR. Reversing this order would publish a JAR with TEST_MODE=true baked
        # in -- usable for smoke discovery but wrong for any other consumer.
        run: ./gradlew :org.speleodb.ariane.plugin.speleodb:test

      - name: Build plugin (:org.speleodb.ariane.plugin.speleodb:build)
        # `:build` is overridden to `setDependsOn([assemble])` so this is just
        # `:assemble`: produces the CalVer-stamped, TEST_MODE=false production JAR
        # that gets uploaded as the `plugin-jar` artifact below.
        run: ./gradlew :org.speleodb.ariane.plugin.speleodb:build

      - name: Verify SpeleoDBConstants.java was reset by the FlowAction
        # Regression guard for settings.gradle's post-build FlowAction (TEST_MODE=false,
        # VERSION=null). If this fails, Gradle 9.x / JDK 25 broke the FlowAction and the
        # repo would otherwise commit dirty constants on the next git add -A.
        #
        # The file lives in a submodule, so `git status` must run from inside the
        # submodule -- a parent-repo `git status -- <path>` never reaches into the
        # submodule's working tree and would silently report "clean" no matter what.
        run: |
          set -eo pipefail
          CONST=src/main/java/org/speleodb/ariane/plugin/speleodb/SpeleoDBConstants.java
          cd org.speleodb.ariane.plugin.speleodb
          DIRTY=$(git status --porcelain -- "$CONST")
          if [ -n "$DIRTY" ]; then
            echo "::error::SpeleoDBConstants.java is dirty after build -- post-build FlowAction did not reset TEST_MODE/VERSION"
            git --no-pager diff -- "$CONST"
            exit 1
          fi
          # Belt-and-suspenders: read the file directly in case the submodule was
          # checked out detached and `git status` somehow misses content drift.
          if ! grep -qE 'public static final boolean TEST_MODE = false;' "$CONST"; then
            echo "::error::TEST_MODE was not reset to false in $CONST"
            grep 'TEST_MODE' "$CONST" || true
            exit 1
          fi
          if ! grep -qE 'public static final String VERSION = null;' "$CONST"; then
            echo "::error::VERSION was not reset to null in $CONST"
            grep 'public static final String VERSION' "$CONST" || true
            exit 1
          fi
          echo "OK: SpeleoDBConstants.java was reset to TEST_MODE=false / VERSION=null"

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: org.speleodb.ariane.plugin.speleodb/build/libs/*.jar
          if-no-files-found: error

  reproducible-jar:
    name: reproducible JAR check
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make wrapper executable
        run: chmod +x ./gradlew

      - name: First build
        run: |
          ./gradlew clean :org.speleodb.ariane.plugin.speleodb:assemble
          mkdir -p /tmp/jar-1
          cp org.speleodb.ariane.plugin.speleodb/build/libs/*.jar /tmp/jar-1/
          (cd /tmp/jar-1 && sha256sum *.jar > sums.txt && cat sums.txt)

      - name: Second build
        run: |
          ./gradlew clean :org.speleodb.ariane.plugin.speleodb:assemble
          mkdir -p /tmp/jar-2
          cp org.speleodb.ariane.plugin.speleodb/build/libs/*.jar /tmp/jar-2/
          (cd /tmp/jar-2 && sha256sum *.jar > sums.txt && cat sums.txt)

      - name: Compare hashes
        run: |
          set -eo pipefail
          # Strip dir prefixes; compare just hash + filename.
          awk '{print $1, $2}' /tmp/jar-1/sums.txt | sort > /tmp/sums-1.txt
          awk '{print $1, $2}' /tmp/jar-2/sums.txt | sort > /tmp/sums-2.txt
          if ! diff -u /tmp/sums-1.txt /tmp/sums-2.txt; then
            echo "::error::JAR is NOT reproducible across two builds"
            exit 1
          fi
          echo "OK: identical SHA256 across two clean builds"

  dependency-submission:
    name: dependency graph (Dependabot)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
